name: Deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - ".github/workflows/dokploy-provision.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: afonsoburginski/portfolio:latest
  # Deploy é feito pelo Dokploy (Traefik + Cloudflare). O CI builda+push a imagem e dispara o redeploy via API.
  DOKPLOY_URL: "http://31.97.253.138:3000"
  # ⚠️ Preencher com o composeId do recurso "Compose" do portfolio no Dokploy.
  DOKPLOY_COMPOSE_ID: "K66BsH5I70okW5ddMPahc"
  HEALTH_URL: "https://afonsodev.com/api/health"

jobs:
  build:
    name: Build & Push · web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha,scope=portfolio
          cache-to: type=gha,mode=max,scope=portfolio
          build-args: |
            NEXT_PUBLIC_APP_URL=https://afonsodev.com
            NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY=${{ secrets.NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY }}

  deploy:
    name: Deploy · Dokploy
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Disparar redeploy do compose no Dokploy
        run: |
          echo "▸ Acionando deploy no Dokploy (pull ${IMAGE} + recreate)…"
          # retry: a conexao GitHub->VPS:3000 ocasionalmente da timeout transitorio
          for attempt in 1 2 3 4 5; do
            if curl -fsSL -X POST -m 30 \
              -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
              -H "Content-Type: application/json" \
              "${{ env.DOKPLOY_URL }}/api/compose.deploy" \
              -d "{\"composeId\":\"${{ env.DOKPLOY_COMPOSE_ID }}\"}"; then
              echo " ✓ deploy acionado (tentativa $attempt)"; exit 0
            fi
            echo "tentativa $attempt falhou; retry em 15s…"; sleep 15
          done
          echo "::error::nao consegui acionar o deploy apos 5 tentativas"; exit 1

      - name: Checar saúde pública (via Cloudflare)
        run: |
          echo "▸ Aguardando o serviço estabilizar…"
          for i in $(seq 1 20); do
            sleep 15
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 15 "${{ env.HEALTH_URL }}" || true)
            echo "tentativa $i: /api/health -> $code"
            [ "$code" = "200" ] && echo "✅ Portfolio no ar via Dokploy" && exit 0
          done
          echo "⚠️ não confirmou 200 a tempo — verifique o deploy no painel do Dokploy"
          exit 1

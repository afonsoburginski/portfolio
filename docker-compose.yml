services:

  # ─── Postgres ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-portfolio}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-portfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - portfolio-network

  # ─── Web (Next.js standalone) ────────────────────────────────────────────────
  web:
    image: afonsoburginski/portfolio:latest
    pull_policy: always
    # No host port published: Dokploy/Traefik routes to this service's container
    # port 3000 over the internal network via the configured domain. Publishing
    # 3000:3000 collides with Dokploy itself (which owns host :3000). For local
    # `docker compose up`, add a docker-compose.override.yml with a `ports` map.
    expose:
      - "3000"
    mem_limit: 1g
    mem_reservation: 512m
    cpus: "1.5"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Banco (rede interna do compose)
      - DATABASE_URL=postgres://${POSTGRES_USER:-portfolio}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-portfolio}
      # App / Auth
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://afonsodev.com}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-https://afonsodev.com}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - DASHBOARD_ADMIN_SECRET=${DASHBOARD_ADMIN_SECRET:-}
      # Email
      - RESEND_API_KEY=${RESEND_API_KEY}
      # IA (geração de contratos)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Cloudflare R2 (API S3)
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET:-portfolio}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-https://cdn.afonsodev.com}
      # Mercado Pago
      - NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY=${NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY:-}
      - MERCADOPAGO_ACCESS_TOKEN=${MERCADOPAGO_ACCESS_TOKEN:-}
      - MERCADOPAGO_CLIENT_ID=${MERCADOPAGO_CLIENT_ID:-}
      - MERCADOPAGO_CLIENT_SECRET=${MERCADOPAGO_CLIENT_SECRET:-}
      - MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - portfolio-network

volumes:
  pgdata:

networks:
  portfolio-network:
    driver: bridge
